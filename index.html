<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оценка промпт-инжиниринга ✍️</title>
    <!-- Рукописный шрифт Caveat -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f2f4f8;
            --shadow-dark: #d9dfe8;
            --shadow-light: #ffffff;
            --text: #3b3e4a;
            --accent: #8b8fd4;
            --radius: 30px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        /* Лёгкие декоративные пятна на фоне */
        body::before {
            content: '';
            position: fixed;
            top: -15%;
            left: -5%;
            width: 60%;
            height: 80%;
            background: radial-gradient(circle at 30% 40%, rgba(139, 143, 212, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -10%;
            right: -5%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle at 70% 60%, rgba(180, 185, 230, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        #dissolve-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }

        .slides-container {
            position: relative;
            width: 95%;
            max-width: 1100px;
            height: 90vh;
            max-height: 800px;
            z-index: 1;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: var(--radius);
            background: var(--bg);
            box-shadow: 20px 20px 40px var(--shadow-dark),
                        -20px -20px 40px var(--shadow-light);
            transition: opacity 0.3s ease;
            visibility: hidden;
            opacity: 0;
            padding: 30px;
            color: var(--text);
            overflow-y: auto;
        }

        .slide.active {
            visibility: visible;
            opacity: 1;
        }

        /* Рукописный шрифт для заголовков и ключевого текста */
        .slide h1, .slide h2, .slide .handwritten {
            font-family: 'Caveat', cursive;
            font-weight: 700;
        }

        .slide h1 {
            font-size: 4em;
            margin-bottom: 15px;
            color: #2c2f40;
            line-height: 1.2;
        }

        .slide h2 {
            font-size: 2.8em;
            margin-bottom: 20px;
            color: #3b3e4a;
        }

        .slide p {
            font-size: 1.3em;
            line-height: 1.5;
            max-width: 700px;
            color: #5a5e6b;
            font-family: 'Nunito', sans-serif;
        }

        .slide img {
            max-width: 90%;
            max-height: 75vh;
            border-radius: 20px;
            box-shadow: 12px 12px 24px var(--shadow-dark),
                        -12px -12px 24px var(--shadow-light);
            margin: 20px 0;
            transition: transform 0.2s ease;
        }

        .slide img:hover {
            transform: scale(1.02);
        }

        .controls {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 25px;
            z-index: 999;
        }

        .btn {
            background: var(--bg);
            border: none;
            border-radius: 50px;
            padding: 14px 30px;
            font-size: 1em;
            color: var(--text);
            box-shadow: 8px 8px 16px var(--shadow-dark),
                        -8px -8px 16px var(--shadow-light);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Nunito', sans-serif;
            letter-spacing: 0.5px;
        }

        .btn:active {
            box-shadow: inset 6px 6px 12px var(--shadow-dark),
                        inset -6px -6px 12px var(--shadow-light);
        }

        .indicator {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--accent);
            font-size: 0.9em;
            z-index: 999;
            opacity: 0.9;
            font-family: 'Nunito', sans-serif;
        }

        @media (max-width: 600px) {
            .slide h1 { font-size: 2.5em; }
            .slide h2 { font-size: 1.8em; }
            .slide p { font-size: 1em; }
        }
    </style>
</head>
<body>

    <canvas id="dissolve-canvas"></canvas>

    <div class="slides-container">
        <!-- Слайд 1: Введение -->
        <div class="slide active" id="slide0">
            <h1>Оценка промпт-инжиниринга</h1>
            <p>Тестируйте и оценивайте навыки написания AI-промптов<br>у кандидатов в автоматическом режиме.</p>
        </div>

        <!-- Слайд 2: Общий вид заданий (слайд2.png) -->
        <div class="slide" id="slide1">
            <img src="слайд2.png" alt="Общий вид заданий">
        </div>

        <!-- Слайд 3: Задание "Анализ тональности" (слайд3.png) -->
        <div class="slide" id="slide2">
            <img src="слайд3.png" alt="Задание: анализ тональности отзывов">
        </div>

        <!-- Слайд 4: Результат кандидата (слайд4.png) -->
        <div class="slide" id="slide3">
            <img src="слайд4.png" alt="Результат оценки: 45/100">
        </div>

        <!-- Слайд 5: Задание "Генерация Job Description" (слайд5.png) -->
        <div class="slide" id="slide4">
            <img src="слайд5.png" alt="Задание: генерация JD">
        </div>

        <!-- Слайд 6: Общая статистика (слайд6.png) -->
        <div class="slide" id="slide5">
            <img src="слайд6.png" alt="Статистика ответов кандидатов">
        </div>
    </div>

    <div class="indicator" id="indicator">Слайд 1 / 6</div>
    <div class="controls">
        <button class="btn" id="prevBtn">← Назад</button>
        <button class="btn" id="nextBtn">Вперёд →</button>
    </div>

    <script>
        (function() {
            const slides = document.querySelectorAll('.slide');
            const totalSlides = slides.length;
            let currentIndex = 0;
            const canvas = document.getElementById('dissolve-canvas');
            const ctx = canvas.getContext('2d');
            const indicator = document.getElementById('indicator');
            let isAnimating = false;

            // Цвета частиц под светлую тему (мягкие, пастельные)
            const particleColors = [
                '#f2f4f8', '#ffffff', '#d9dfe8', '#8b8fd4', '#b4b9e6', '#c5cae9', '#e8eaf6'
            ];

            function updateIndicator() {
                indicator.textContent = `Слайд ${currentIndex + 1} / ${totalSlides}`;
            }

            function dissolveToNext(targetIndex) {
                if (isAnimating || targetIndex === currentIndex) return;
                if (targetIndex < 0 || targetIndex >= totalSlides) return;

                isAnimating = true;

                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                canvas.style.display = 'block';
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const particles = [];
                const count = 3000;

                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 8;
                    const color = particleColors[Math.floor(Math.random() * particleColors.length)];
                    const size = 2 + Math.random() * 6;
                    particles.push({
                        x: cx + (Math.random() - 0.5) * 200,
                        y: cy + (Math.random() - 0.5) * 100,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1,
                        decay: 0.01 + Math.random() * 0.03,
                        color: color,
                        size: size
                    });
                }

                slides[currentIndex].classList.remove('active');
                slides[targetIndex].classList.add('active');

                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    let alive = false;
                    particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.life -= p.decay;
                        if (p.life > 0) {
                            alive = true;
                            ctx.globalAlpha = p.life;
                            ctx.fillStyle = p.color;
                            ctx.fillRect(p.x, p.y, p.size, p.size);
                        }
                    });
                    if (alive) {
                        requestAnimationFrame(animate);
                    } else {
                        canvas.style.display = 'none';
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        currentIndex = targetIndex;
                        updateIndicator();
                        isAnimating = false;
                    }
                }
                animate();
            }

            document.getElementById('nextBtn').addEventListener('click', function() {
                dissolveToNext(currentIndex + 1);
            });
            document.getElementById('prevBtn').addEventListener('click', function() {
                dissolveToNext(currentIndex - 1);
            });

            window.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowRight' || e.key === 'Right' || e.key === ' ') {
                    e.preventDefault();
                    dissolveToNext(currentIndex + 1);
                } else if (e.key === 'ArrowLeft' || e.key === 'Left') {
                    e.preventDefault();
                    dissolveToNext(currentIndex - 1);
                }
            });

            let touchStartX = 0;
            window.addEventListener('touchstart', function(e) {
                touchStartX = e.touches[0].clientX;
            }, {passive: true});
            window.addEventListener('touchend', function(e) {
                const diff = e.changedTouches[0].clientX - touchStartX;
                if (Math.abs(diff) > 50) {
                    if (diff < 0) dissolveToNext(currentIndex + 1);
                    else dissolveToNext(currentIndex - 1);
                }
            });

            updateIndicator();
        })();
    </script>
</body>
</html>
